name: Deploy URL Shortener

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'DEPLOY.md'
      - 'ARCHITECTURE.md'
      - 'walkthrough.md'
      - 'task.md'
      - 'ai-history/**'
      - '.agents/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH (Local Build on VPS)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/url-shortener
            
            echo "---> Pulling latest code from GitHub..."
            git pull origin main

            echo "---> Synchronizing deployment configurations..."
            mkdir -p data/geoip
            cp -r url-shortener-be/deploy/app url-shortener-be/deploy/infra url-shortener-be/deploy/nginx url-shortener-be/deploy/infra-up.sh ./
            
            echo "---> Writing production .env configuration..."
            echo "DOMAIN=urlshort.toannguyenit.com" > .env
            echo "API_URL=https://api-urlshort.toannguyenit.com" >> .env
            echo "SHORT_URL_BASE=https://go-urlshort.toannguyenit.com" >> .env
            echo "FRONTEND_URL=https://urlshort.toannguyenit.com" >> .env
            echo "JWT_SECRET=supersecretjwtkeyholdingfortyeeightbytesvalueforsecurity" >> .env
            echo "GHCR_OWNER=toannguyenit" >> .env
            echo "IMAGE_TAG=latest" >> .env
            echo "MONGO_DB=urlshortener" >> .env
            echo "RABBITMQ_USER=urlshortener" >> .env
            echo "RABBITMQ_PASSWORD=urlshortenerpwd" >> .env
            echo "RABBITMQ_VHOST=urlshortener" >> .env
            echo "GOOGLE_CLIENT_ID=751785349464-t67s34loabfj8ht1tak75hd2aq489lrr.apps.googleusercontent.com" >> .env
            echo "NGINX_HTTP_PORT=80" >> .env
            echo "NGINX_HTTPS_PORT=443" >> .env
            
            echo "---> Building Auth Service..."
            docker build -t ghcr.io/toannguyenit/url-shortener-auth:latest -f url-shortener-be/auth-service/Dockerfile url-shortener-be
            
            echo "---> Building URL Service..."
            docker build -t ghcr.io/toannguyenit/url-shortener-url:latest -f url-shortener-be/url-service/Dockerfile url-shortener-be
            
            echo "---> Building Redirect Service..."
            docker build -t ghcr.io/toannguyenit/url-shortener-redirect:latest -f url-shortener-be/redirect-service/Dockerfile url-shortener-be
            
            echo "---> Building Analytics Service..."
            docker build -t ghcr.io/toannguyenit/url-shortener-analytics:latest -f url-shortener-be/analytics-service/Dockerfile url-shortener-be
            
            echo "---> Building API Gateway..."
            docker build -t ghcr.io/toannguyenit/url-shortener-gateway:latest -f url-shortener-be/api-gateway/Dockerfile url-shortener-be
            
            echo "---> Building Next.js Frontend..."
            docker build -t ghcr.io/toannguyenit/url-shortener-fe:latest \
              --build-arg NEXT_PUBLIC_API_URL=https://api-urlshort.toannguyenit.com \
              --build-arg NEXT_PUBLIC_SHORT_URL_BASE=https://go-urlshort.toannguyenit.com \
              --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=751785349464-t67s34loabfj8ht1tak75hd2aq489lrr.apps.googleusercontent.com \
              -f url-shortener-fe/Dockerfile url-shortener-fe
            
            echo "---> Ensuring database infrastructure is running..."
            chmod +x infra-up.sh
            ./infra-up.sh
            
            echo "---> Starting application services..."
            docker compose --env-file .env -f app/docker-compose.yml up -d --remove-orphans
            
            echo "---> Pruning unused docker images..."
            docker image prune -f
            
            echo "---> Verifying running services..."
            docker compose --env-file .env -f app/docker-compose.yml ps
            
            echo "DEPLOYMENT COMPLETE!"
